# db/changelog/changes/002-create-refresh-tokens.yaml
databaseChangeLog:
  - changeSet:
      id: 2
      author: developer
      context: dev,prod
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_tokens_user
                    references: users(id)
                    deleteCascade: true


        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: refresh_tokens
            indexName: idx_refresh_tokens_expires_at
            columns:
              - column:
                  name: expires_at

      rollback:
        - dropTable:
            tableName: refresh_tokens